<!-- Google Maps Platform (Places API New, autocomplete villes).
     La clé navigateur est servie par /api/public/maps-config et n'est valide
     que sur *.lovable.app (référent restreint). Si l'endpoint répond vide, le
     wizard retombe sur la recherche locale. -->
<script>
  window.initLouannMaps = function () {
    window.__GMAPS_READY__ = true;
    window.dispatchEvent(new Event('gmaps:ready'));
  };
  (function () {
    fetch('/api/public/maps-config')
      .then((r) => r.ok ? r.json() : null)
      .then((cfg) => {
        if (!cfg || !cfg.browserKey) return;
        var s = document.createElement('script');
        s.async = true;
        s.src = 'https://maps.googleapis.com/maps/api/js?key=' +
          encodeURIComponent(cfg.browserKey) +
          '&libraries=places&loading=async&callback=initLouannMaps' +
          (cfg.trackingId ? '&channel=' + encodeURIComponent(cfg.trackingId) : '');
        document.head.appendChild(s);
      })
      .catch(() => { /* silencieux : fallback local */ });
  })();
</script>
